name = "github-issues"
description = "Bidirectional adapter for GitHub repository issues. Polls open issues and supports status updates, comments, issue creation, and pull request creation."
version = "0.1.0"
adapter_type = "native"
direction = "bidirectional"
capabilities = [
    "poll_items",
    "update_status",
    "post_comment",
    "create_item",
    "map_priority",
    "custom",
]

[config]
# Required: GitHub repository owner (user or organisation name).
owner = ""

# Required: GitHub repository name.
repo = ""

# Optional: Issue state to poll. One of "open", "closed", or "all".
# Defaults to "open" when left empty.
state = "open"

# Optional: Comma-separated list of label names to filter by.
# Only issues that carry at least one of these labels will be ingested.
# Leave empty to ingest all issues.
filter_labels = ""

# Status name mappings for lifecycle sync (optional).
#
# The lifecycle sync handler defaults to "skip" for all events, so GitHub issue
# state is never touched by lifecycle transitions. Issue state is managed by:
#   - PR merge: "Closes #N" in the PR body closes the issue automatically on merge.
#   - egress_publish: explicit wontfix close from the Overmind on triage rejection.
#
# To opt into lifecycle-driven state updates, set any of the following keys to a
# GitHub issue state ("open" or "closed") or a named status that the egress adapter
# maps to one. Leave unset (or set to "skip") to leave the issue state unchanged.
#
# status_in_progress = "open"
# status_done = "closed"
# status_failed = "open"
# status_rejected = "closed"

# Optional: when true, post a comment on the issue explaining why it was
# rejected during triage or validation. Defaults to false.
# comment_on_rejection = "true"

# ── Pull request ingestion ──────────────────────────────────────────────
#
# When enabled, pull requests from the issues endpoint are hydrated via the
# pulls API, filtered, and ingested as read-only review tasks. PR content is
# treated as untrusted — no build, test, or shell execution is permitted.
# Default: false (opt-in).
# ingest_pull_requests = "false"

# Optional: Comma-separated list of base branch names. Only PRs targeting one
# of these branches are ingested. Leave empty to ingest PRs against any base.
# pr_base_filter = "main, develop"

# Optional: Comma-separated list of author logins to ignore (e.g., bot accounts).
# PRs authored by any of these logins are silently skipped.
# pr_ignore_authors = "dependabot[bot], renovate[bot]"

# Optional: Maximum characters of unified diff to include in the task description.
# Diffs exceeding this limit are truncated with a marker. Default: 100000.
# max_diff_chars = "100000"
